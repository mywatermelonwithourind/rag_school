# =============================================================================
# RAG 数据库栈 — 部署在远程服务器，团队成员从本地连 exposed 端口
#
# 用法（在仓库根目录）:
#   cp .env.example .env          # 填 MySQL/MinIO 密码（见根 .env.example）
#   docker compose up -d
#
# 对外端口（宿主机 → 团队远程连接）:
#   ${MYSQL_HOST_PORT:-3306}         → MySQL（backend RAG_MYSQL_HOST=服务器IP）
#   ${MILVUS_HOST_PORT:-19530}       → Milvus（backend RAG_MILVUS_HOST=服务器IP）
#   ${MINIO_CONSOLE_HOST_PORT:-9001}   → MinIO 控制台【可选，仅排查 Milvus 存储】
#
# 仅容器内网（不映射 ports，服务名互通）:
#   etcd:2379  |  minio:9000  |  milvus:9091（健康检查）
# =============================================================================

services:
  etcd:
    container_name: rag-etcd
    image: quay.io/coreos/etcd:v3.5.5
    networks:
      - rag_net
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test:
        ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://localhost:2379"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    container_name: rag-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    networks:
      - rag_net
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    # 9000 仅 Milvus 容器内访问
    # 9001 可选对外 — 仅排查 Milvus 对象存储 / MinIO 控制台；防火墙放行清单归为可选项
    ports:
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: rag-milvus
    image: milvusdb/milvus:v2.4.4
    networks:
      - rag_net
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - milvus_data:/var/lib/milvus
    # 19530: 团队成员本地 backend 远程连向量库
    ports:
      - "${MILVUS_HOST_PORT:-19530}:19530"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  mysql:
    container_name: rag-mysql
    image: mysql:8.0
    networks:
      - rag_net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    # 3306: 团队成员本地 backend 远程连 MySQL
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: rag-backend
    build: ./backend
    networks:
      - rag_net
    env_file:
      - ./backend/.env
    environment:
      RAG_MYSQL_HOST: mysql
      RAG_MILVUS_HOST: milvus
    ports:
      - "8000:8000"
    depends_on:
      milvus:
        condition: service_healthy
      mysql:
        condition: service_healthy

networks:
  rag_net:
    driver: bridge

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  mysql_data:
